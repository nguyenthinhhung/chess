<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Chess.com to Lichess</h2>

  <div class="section">
    <label for="username">Chess.com username</label>
    <input id="username" placeholder="magnuscarlsen">
    <div class="row">
      <input id="count" type="number" value="5" min="1" max="50" title="How many recent games">
      <button id="batchBtn" class="primary">Import last N games</button>
    </div>
  </div>

  <hr>

  <div class="section">
    <label for="pgnPaste">Or paste PGN</label>
    <textarea id="pgnPaste" rows="4" placeholder="[Event &quot;...&quot;]&#10;1. e4 e5 ..."></textarea>
    <button id="pasteBtn" class="primary">Import PGN</button>
  </div>

  <div id="status"></div>
  <div id="results" class="results"></div>

  <hr>
  <button id="optionsBtn" class="secondary">Settings (Lichess token)</button>

  <script src="popup.js"></script>
</body>
</html>
